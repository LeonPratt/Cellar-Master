<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/icon.png" />
  <title>View Wine</title>
  <link rel="stylesheet" href="/assets/styles/app.css" />
</head>
<body>
  <main class="app">
    <header class="top-bar">
      <img class="logo" src="/assets/icons/logo.svg" alt="" />
      <h1 class="title">Wine Details</h1>
      <h1 class="current-cellar"></h1>
    </header>

    <section class="content-panel wine-detail-panel" aria-live="polite">
      <div class="wine-detail-layout">
        <div class="bottle-placeholder" aria-label="Wine bottle image"">
          <img class="bottle-image" data-wine-image alt="" hidden />
          <div class="bottle-silhouette" aria-hidden="true"></div>
        </div>

        <article class="wine-detail-content">
          <div class="wine-detail-header">
            <p class="eyebrow">Cellar</p>
            <input type="text" class="wine-detail-title" data-wine-name>

            <div class="wine-detail-subtitle" data-wine-summary></div>
          </div>

          <form class="detail-grid" data-general-detail-form>
            <div class="detail-stat">
              <span class="detail-label">Producer</span>
              <input type="text" class="detail-value" data-wine-producer placeholder = "unknown" name="producer" />
            </div>

            <div class="detail-stat">
              <span class="detail-label">Region</span>
              <input type="text" class="detail-value" data-wine-region placeholder = "unknown" name="region" />
            </div>

            <div class="detail-stat">
              <span class="detail-label">Grape(s)</span>
              <input type="text" class="detail-value" data-wine-grapes placeholder = "unknown" name="grapes" />
            </div>

            <div class="detail-stat">
              <span class="detail-label">Year</span>
              <input type="text" class="detail-value" data-wine-year placeholder = "unknown" name="year" />
            </div>
            <div class="detail-stat">
              <span class="detail-label">Quantity</span>
              <input type="text" class="detail-value" data-wine-quantity placeholder = "unknown" name="quantity" />
            </div>
            <div class="detail-stat">
              <span class="detail-label">Drink from</span>
              <input type="text" class="detail-value" data-wine-drink-start="" placeholder = "unknown" name="drink-start" />

            </div>
            <div class="detail-stat">
              <span class="detail-label">Drink by</span>
              <input type="text" class="detail-value" data-wine-drink-end placeholder = "unknown" name="drink-end" />

            </div>
            <div class="detail-stat">
              <span class="detail-label">Price</span>
              <input type="text" class="detail-value" data-wine-price placeholder = "unknown" name="price" />

            </div>
            <div></div>
            <button class="general-update" type="submit" data-general-update-button>Update</button>
          </form>

          <section class="detail-section custom-note-section">
            <h2>Custom Note</h2>
            <form class="custom-note-form" data-custom-note-form>
              <textarea
                id="custom-note"
                class="custom-note-input"
                data-wine-custom-note
                name="custom-note"
                placeholder="Add your own note"
                aria-label="Custom note"
                rows="1"
                oninput="this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px';"
              ></textarea>
              <button class="custom-note-update" type="submit">Update Notes</button>
            </form>
            <p class="note-status" data-custom-note-status aria-live="polite"></p>
          </section>

          <section class="detail-section">
            <h2>Tasting Notes</h2>
            <form class="tasting-note-form" data-tasting-note-form>
              <input
                class="tasting-note-input"
                type="text"
                data-tasting-note-input
                placeholder="Add a tasting note"
                autocomplete="off"
              />
              <button class="tasting-note-add" type="submit">Add</button>
            </form>
            <div class="tag-list" data-wine-tasting-notes></div>
            <p class="note-status" data-tasting-note-status aria-live="polite"></p>
          </section>

          <section class="detail-section">
            <h2>Pairings</h2>
            <form class="pairing-form" data-pairing-form>
              <input
                class="pairing-input"
                type="text"
                data-pairing-input
                placeholder="Add a pairing"
                autocomplete="off"
              />
              <button class="pairing-add" type="submit">Add</button>
            </form>
            <div class="tag-list" data-wine-pairings></div>
            <p class="note-status" data-pairing-status aria-live="polite"></p>
          </section>
        </article>
      </div>
    </section>

    <nav class="bottom-nav detail-nav" aria-label="Primary">
      <button class="nav-btn" type="button" data-back-button>Back to search</button>
      <button class="nav-btn" type="button" data-home-button>Home</button>
    </nav>
  </main>

  <script src="/scripts/viewwine.js"></script>
</body>
</html>
