<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search My Wines</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      min-height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background:#d9d9d9;
      font-family:'Montserrat', sans-serif;
    }

    .app{
      width:100%;
      height:100vh;

      position:relative;
      overflow:hidden;

      background-color:#222;

      
      background-image:url("/assets/images/HomePagebg.png");
      

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    /* Header */

    .top-bar{
      width:100%;
      height:10vh;
      min-height:70px;

      background:#2f3568;
      border:none;

      display:flex;
      align-items:center;
      justify-content:center;
      gap:3vw;

      cursor:pointer;
    }

    .logo{
      width:5%;
      color:white;
    }

    .title{
      color:white;
      font-size:clamp(1.7rem, 5vw, 2.5rem);
      font-weight:800;
    }

    /* Main Panel */

    .panel{
      width:88%;
      height:82%;

      position:absolute;
      top:54%;
      left:50%;
      transform:translate(-50%, -50%);

      background:rgba(255,255,255,0.78);
      backdrop-filter:blur(5px);

      border-radius:5vw;

      padding:3vh 4vw;

      display:flex;
      flex-direction:column;
      gap:2vh;
    }

    /* Search Bar */

    .search-container{
      width:100%;
      display:flex;
      gap:3vw;
    }

    .search-box{
      flex:1;

      height:6.5vh;

      border:none;
      border-radius:4vw;

      padding:0 5vw;

      font-size:clamp(0.9rem, 2.8vw, 1.1rem);
      font-family:'Montserrat', sans-serif;

      outline:none;

      background:white;

      box-shadow:0 0.3vh 1vh rgba(0,0,0,0.15);
    }

    .search-btn{
      width:15vw;
      max-width:65px;

      border:none;
      border-radius:4vw;

      background:#2f35d4;

      color:white;

      font-size:1.4rem;
      font-weight:700;

      cursor:pointer;

      box-shadow:0 0.3vh 1vh rgba(0,0,0,0.2);

      transition:0.2s ease;
    }

    .search-btn:hover{
      transform:scale(1.05);
    }

    /* Wine List */

    .wine-list{
      flex:1;

      overflow-y:auto;

      display:flex;
      flex-direction:column;
      gap:2vh;

      padding-right:1vw;
    }

    /* Wine Card */

    .wine-card{
      background:white;

      border-radius:5vw;

      padding:2vh 4vw;

      box-shadow:0 0.4vh 1vh rgba(0,0,0,0.15);

      display:flex;
      justify-content:space-between;
      align-items:center;

      border-left:1.3vw solid #7b1e1e;
    }

    .wine-info{
      display:flex;
      flex-direction:column;
      gap:0.6vh;
    }

    .wine-name{
      font-size:clamp(1rem, 3.5vw, 1.3rem);
      font-weight:800;
      color:#333;
    }

    .wine-details{
      font-size:clamp(0.75rem, 2.5vw, 0.95rem);
      color:#666;
      font-weight:500;
    }

    /* Action Buttons */

    .wine-actions{
      display:flex;
      flex-direction:column;
      gap:1vh;
    }

    .action-btn{
      border:none;

      padding:1vh 3vw;

      border-radius:3vw;

      font-family:'Montserrat', sans-serif;
      font-weight:700;

      font-size:clamp(0.7rem, 2.3vw, 0.9rem);

      cursor:pointer;

      transition:0.2s ease;
    }

    .view-btn{
      background:#2f35d4;
      color:white;
    }

    .delete-btn{
      background:#c0392b;
      color:white;
    }

    .action-btn:hover{
      transform:scale(1.05);
    }

    /* Bottom Navigation */

    .bottom-nav{
      width:100%;
      height:8vh;

      position:absolute;
      bottom:0;
      left:0;

      background:#2f3568;

      display:flex;
      justify-content:space-around;
      align-items:center;
    }

    .nav-btn{
      background:none;
      border:none;

      color:white;

      font-size:clamp(0.8rem, 2.5vw, 1rem);
      font-weight:700;

      cursor:pointer;
    }

    /* Scrollbar */

    .wine-list::-webkit-scrollbar{
      width:6px;
    }

    .wine-list::-webkit-scrollbar-thumb{
      background:#999;
      border-radius:10px;
    }


    .search-icon{
      width:14%;
      min-width:38px;
      height:14%;
      min-height:38px;
      position:relative;
    }

    .search-icon::before{
      content:"";
      position:absolute;
      width:26px;
      height:26px;
      border:5px solid currentColor;
      border-radius:50%;
      top:0;
      left:0;
    }

    .search-icon::after{
      content:"";
      position:absolute;
      width:5px;
      height:20px;
      background:currentColor;
      transform:rotate(-45deg);
      bottom:-4px;
      right:0px;
      border-radius:4px;
    }
  </style>
</head>
<body>

  <div class="app">

    <!-- Header -->

    <button class="top-bar">

      <img class="logo" src="/assets/icons/logo.svg"></img>

      <div class="title">
        My Wines
      </div>

    </button>

    <!-- Main Panel -->

    <div class="panel">

      <!-- Search -->

      <div class="search-container">

        <input
          type="text"
          class="search-box"
          placeholder="Search wines..."
        >

        <button class="search-btn">
            <img src="/assets/icons/searchicon.svg">
        </button>

      </div>

      <!-- Wine List -->

      <div class="wine-list">


      </div>

    </div>

    <!-- Bottom Navigation -->

    <div class="bottom-nav">

      <button class="nav-btn">
        Home
      </button>
    </div>

  </div>
<script src="/scripts/searchwine.js"></script>
</body>
</html>
