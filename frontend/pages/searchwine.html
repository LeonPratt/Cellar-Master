<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search My Wines</title>
  <link rel="stylesheet" href="/assets/styles/app.css" />
</head>
<body>
  <main class="app">
    <header class="top-bar">
      <img class="logo" src="/assets/icons/logo.svg" alt="" />
      <h1 class="title">My Wines</h1>
    </header>

    <section class="content-panel workspace-panel" aria-label="Wine search">
      <div class="search-container">
        <input
          type="text"
          class="search-box"
          placeholder="Search by name, grape, region or year"
          autocomplete="off"
        />

        <button class="search-btn" type="button" aria-label="Search wines">
          <img src="/assets/icons/searchicon.svg" alt="" />
        </button>
      </div>

      <div class="wine-list"></div>
    </section>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-btn" type="button">Home</button>
    </nav>
  </main>

  <script src="/scripts/searchwine.js"></script>
</body>
</html>
