<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="CellarMaster" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png" />
  <link rel="stylesheet" href="/assets/styles/app.css" />
  <title>Manage Your Cellar | CellarMaster</title>
</head>
<body>
  <main class="home-shell cellar-index-page">
    <button class="top-bar" type="button" data-home-button aria-label="CellarMaster home">
      <img class="logo" id = "logo" src="/assets/icons/logo.svg" alt="" />
      <h1 class="brand-title">CellarMaster</h1>
      <h1 class="current-cellar"></h1>
    </button>

    <section class="content-panel home-panel add-remove-panel" aria-labelledby="add-remove-title">
      <div class="index-intro">
        <p class="eyebrow">Cellar tools</p>
        <h2 id="add-remove-title">What would you like to do?</h2>
        <p>Add a newly discovered bottle to your collection, or remove a bottle you have opened.</p>
      </div>

      <div class="action-grid add-remove-grid">
        <button class="menu-btn" id="add" type="button">
          <span class="menu-icon" aria-hidden="true">
            <img src="/assets/icons/add.svg" alt="" />
          </span>
          <span>Grow your collection</span>
          <strong>Add a wine</strong>
        </button>

        <button class="menu-btn" id="remove" type="button">
          <span class="menu-icon" aria-hidden="true">
            <img src="/assets/icons/remove.svg" alt="" />
          </span>
          <span>Remove from your collection</span>
          <strong>Remove a wine</strong>
        </button>
      </div>
    </section>
    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-btn" id="home"type="button">Home</button>
    </nav>
  </main>

  <script src="/scripts/add_remove_selection.js"></script>
</body>
</html>
