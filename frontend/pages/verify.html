<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/icon.png" />
  <title>Confirm Wine Details</title>
  <link rel="stylesheet" href="/assets/styles/app.css" />
</head>
<body class="verify-page">
  <div id="bgimage" class="background"></div>

  <main class="verify-container">
    <form class="form-card" id="wine-form">
      <h1>Confirm the bottle</h1>
      <p>Review the details from the label before updating your cellar.</p>

      <input type="text" class="input-field" placeholder="Wine name" name="name" />
      <input type="text" class="input-field" placeholder="Producer" name="producer" />
      <input type="text" class="input-field" placeholder="Grape variety" name="grape_variety" />
      <input type="text" class="input-field" placeholder="Region" name="region" />
      <input type="text" class="input-field" placeholder="Year" name="year" />
      <input type="text" class="input-field" placeholder="Quantity" name="quantity" />

      <div class="button-row">
        <button class="submit-btn" id="add" type="submit">Add to cellar</button>
        <button class="submit-btn secondary" id="remove" type="button">Remove</button>
      </div>
    </form>
  </main>

  <script src="/scripts/verify.js"></script>
</body>
</html>
