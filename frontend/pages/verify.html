<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Responsive Wine Form</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  >

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Background image area */
    .background {
      position: fixed;
      inset: 0;
      filter:blur(3px);
      background-image: none;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* Dark overlay for readability */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.12);
    }

    /* Main container */
    .container {
      position: relative;
      min-height: 100vh;

      display: flex;
      justify-content: center;
      align-items: flex-end;

      padding:
        clamp(16px, 4vw, 32px);
    }

    /* Form card */
    .form-card {

      width: min(90vw, 380px);

      background: rgba(255,255,255,0.96);

      border-radius: clamp(28px, 5vw, 36px);

      padding: clamp(28px, 5vw, 42px);

      display: flex;
      flex-direction: column;

      gap: clamp(18px, 3vw, 24px);

      backdrop-filter: blur(8px);

      box-shadow:
        0 10px 40px rgba(0,0,0,0.12);

      /* Initial state */
      opacity: 0;
      transform: translateY(120px) scale(0.96);

      /* Smooth modern animation */
      animation:
        slideFadeIn 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    /* Animation */
    @keyframes slideFadeIn {

      from {
        opacity: 0;
        transform: translateY(120px) scale(0.96);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

    }
    /* Inputs */
    .input-field {

      width: 100%;
      height:
        clamp(46px, 7vw, 52px);

      border: none;
      outline: none;

      border-radius: 8px;

      padding: 0 18px;

      background: #f3f3f3;

      font-size:
        clamp(13px, 2vw, 15px);

      color: #444;

      box-shadow:
        0 3px 8px rgba(0,0,0,0.08);

      transition:
        0.2s ease;
    }

    .input-field:focus {
      background: #ffffff;

      box-shadow:
        0 0 0 2px rgba(45,163,230,0.25),
        0 4px 12px rgba(0,0,0,0.08);
    }

    .input-field::placeholder {
      color: #888;
    }

    /* Submit button */
    .submit-btn {

      margin-top: 8px;

      height:
        clamp(48px, 8vw, 56px);

      border: none;
      border-radius: 10px;

      background: #2da3e6;
      color: white;

      font-size:
        clamp(15px, 2.4vw, 18px);

      font-weight: 600;

      cursor: pointer;

      transition:
        transform 0.18s ease,
        background 0.18s ease,
        box-shadow 0.18s ease;

      box-shadow:
        0 6px 16px rgba(45,163,230,0.35);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      background: #2497d9;
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    /* Button row */
    .button-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    /* Make buttons fit side by side */
    .button-row .submit-btn {
      flex: 1;
      margin-top: 8px;

      height: clamp(48px, 8vw, 56px);

      font-size: clamp(13px, 2vw, 16px);

      padding: 0 10px;
    }

    /* Mobile adjustments */
    @media (max-height: 700px) {

      .container {
        align-items: center;
      }

      .form-card {
        padding: 24px;
      }

    }

  </style>
</head>

<body>

  <div id="bgimage" class="background" ></div>
  <div class="overlay"></div>

  <main class="container">

    <form class="form-card" id="wine-form">

      <input type="text" class="input-field" placeholder="Wine Name" name="name">

      <input type="text" class="input-field" placeholder="Grape(s)" name="grape_variety">

      <input type="text" class="input-field" placeholder="Region" name="region">

      <input type="text" class="input-field" placeholder="Year" name = "year">

      <input type="text" class="input-field" placeholder="Quantity" name = "quantity">

      <div class="button-row">
        <button class="submit-btn" id="add">
          Add to cellar
        </button>

        <button class="submit-btn" id="remove">
          Remove from cellar
        </button>
      </div></form>
    <script src="/scripts/verify.js"></script>
  </main>


</body>
</html>
