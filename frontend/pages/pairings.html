<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/icon.png" />
  <title>Food Pairings</title>
  <link rel="stylesheet" href="/assets/styles/app.css" />
</head>
<body>
  <main class="app">
    <header class="top-bar">
      <img class="logo" id="home" src="/assets/icons/logo.svg" alt="" />
      <h1 class="title">Pairings</h1>
    </header>

    <section class="content-panel workspace-panel" aria-label="Food pairing search">
      <div class="search-container">
        <input
          type="text"
          class="search-box"
          placeholder="Search a food, dish or ingredient"
          autocomplete="off"
        />

        <button class="search-btn" type="button" aria-label="Search pairings">
          <img src="/assets/icons/searchicon.svg" alt="" />
        </button>
      </div>

      <div class="pairing-summary">
        Search for a food, such as steak, lamb, salmon or cheese.
      </div>

      <div class="wine-list"></div>
    </section>

    <nav class="bottom-nav" aria-label="Primary">
      <button class="nav-btn" type="button">Home</button>
    </nav>
  </main>

  <script src="/scripts/pairings.js"></script>
</body>
</html>
