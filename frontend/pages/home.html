<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CellarMaster</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      background:#dcdcdc;
      font-family:'Montserrat', sans-serif;
    }

    .phone{
      width:100vw;
      height:100vh;
      overflow:hidden;
      position:relative;
      border-radius:0;
      box-shadow:none;

      /* ADD YOUR BACKGROUND IMAGE HERE */
      background-color:#222;
      background-image: url("/assets/images/HomePagebg.png");
      background-size:cover;
      background-position:center;
    }

    /* Top Button */
    .top-bar{
      width:100%;
      height:9.36%;
      background:#2f3568;
      border:none;

      display:flex;
      align-items:center;
      justify-content:center;
      gap:3.5%;

      cursor:pointer;
    }

    .top-bar img{
      width:10.8%;
      height:auto;
      max-width:42px;
    }

    .top-bar h1{
      color:white;
      font-size:clamp(1.5rem, 3vw, 2rem);
      font-weight:800;
    }

    /* Main Glass Panel */
    .panel{
      width:69.3%;
      height:75.1%;

      position:absolute;
      top:17.85%;
      left:50%;
      transform:translateX(-50%);

      background:rgba(255,255,255,0.78);
      backdrop-filter:blur(4px);

      border-radius:6.4%;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-evenly;

      padding:4.5% 0;
    }

    /* Action Buttons */
    .menu-btn{
      width:44%;
      height:44%;

      background:#f5f5f5;
      border-radius:30px;

      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;

      font-size:clamp(0.9rem, 2vw, 1rem);
      font-weight:800;
      line-height:1.3;
      text-align:center;
      color:#3f3f3f;

      cursor:pointer;
      transition:0.2s ease;

      box-shadow:0 4px 10px rgba(0,0,0,0.25);
      margin:5px;
    }

    .menu-btn:hover{
      transform:scale(1.03);
    }

    /* Green Button */
    .green{
      border:4px solid #158a5c;
      background:linear-gradient(
        to bottom,
        #ffffff 55%,
        rgba(21,138,92,0.45)
      );
    }

    /* Blue Button */
    .blue{
      border:4px solid #2f35d3;
      background:linear-gradient(
        to bottom,
        #ffffff 60%,
        rgba(47,53,211,0.18)
      );
    }

    /* Yellow Button */
    .yellow{
      border:4px solid #c8ac1f;
      background:linear-gradient(
        to bottom,
        #ffffff 60%,
        rgba(200,172,31,0.35)
      );
    }

    .icon{
      margin-bottom:1rem;
    }

    /* Plus Icon */
    .plus{
      font-size:clamp(3rem, 6vw, 4rem);
      line-height:0.8;
      color:#158a5c;
    }

    /* Search Icon */
    .search-icon{
      width:14%;
      min-width:38px;
      height:14%;
      min-height:38px;
      position:relative;
    }

    .search-icon::before{
      content:"";
      position:absolute;
      width:26px;
      height:26px;
      border:5px solid currentColor;
      border-radius:50%;
      top:0;
      left:0;
    }

    .search-icon::after{
      content:"";
      position:absolute;
      width:5px;
      height:20px;
      background:currentColor;
      transform:rotate(-45deg);
      bottom:-4px;
      right:0px;
      border-radius:4px;
    }

    .blue .search-icon{
      color:#2f35d3;
    }

    .yellow .search-icon{
      color:#c8ac1f;
    }

  </style>
</head>
<body>

  <div class="phone">

    <!-- CellarMaster Button -->
    <button class="top-bar">

      <!-- Temporary Emoji Logo -->
      <div style="font-size:38px;">🍇</div>

      <h1>CellarMaster</h1>
    </button>

    <div class="panel">

      <!-- Add / Remove Wine -->
      <button class="menu-btn green" id="add_remove">
        <div class="icon plus">+</div>

        <div>
          ADD OR<br>
          REMOVE<br>
          WINE
        </div>
      </button>

      <!-- Search My Wines -->
      <button class="menu-btn blue" id="search_wine">
        <div class="icon search-icon"></div>

        <div>
          SEARCH<br>
          MY<br>
          WINES
        </div>
      </button>

      <!-- Search Food Pairings -->
      <button class="menu-btn yellow" id ="search_pairing">
        <div class="icon search-icon"></div>

        <div>
          SEARCH<br>
          FOOD<br>
          PAIRINGS
        </div>
      </button>

    </div>

  </div>
<script src="/scripts/home.js"></script>

</body>
</html>
