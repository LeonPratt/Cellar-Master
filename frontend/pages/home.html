<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CellarMaster</title>
  <link rel="stylesheet" href="/assets/styles/app.css" />
</head>
<body>
  <main class="home-shell">
    <button class="top-bar" type="button" aria-label="CellarMaster home">
      <img class="logo" src="/assets/icons/logo.svg" alt="" />
      <h1 class="brand-title">CellarMaster</h1>
    </button>

    <section class="content-panel home-panel">
      <div class="home-intro">
        <p class="eyebrow">Private cellar</p>
        <h2>Keep track of the bottles worth remembering.</h2>
        <p>
          Add wines from a label photo, search your cellar, or find bottles that suit tonight's food.
        </p>
      </div>

      <div class="action-grid">
        <button class="menu-btn" id="add_remove" type="button">
          <span class="menu-icon plus" aria-hidden="true">+</span>
          <span>Cellar tools</span>
          <strong>Add or remove wine</strong>
        </button>

        <button class="menu-btn" id="search_wine" type="button">
          <span class="menu-icon">
            <img src="/assets/icons/searchicon.svg" alt="" />
          </span>
          <span>Inventory</span>
          <strong>Search my wines</strong>
        </button>

        <button class="menu-btn" id="search_pairing" type="button">
          <span class="menu-icon">
            <img src="/assets/icons/searchicon.svg" alt="" />
          </span>
          <span>Pairing guide</span>
          <strong>Match food pairings</strong>
        </button>
      </div>
    </section>
  </main>

  <script src="/scripts/home.js"></script>
</body>
</html>
