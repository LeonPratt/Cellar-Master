<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/icon.png" />
  <title>Camera</title>
  <link rel="stylesheet" href="/assets/styles/app.css" />
</head>
<body class="camera-body">
  <video id="previewVideo" playsinline autoplay muted></video>

  <div id="overlayDiv">
    <div class="loader"></div>
  </div>

  <div id="errorPopup"class="popup-backdrop" visibility="hidden">
    <div class="popup-card" role="dialog" aria-modal="true" aria-labelledby="errorPopupTitle">
      <h2 id="errorPopupTitle">Upload failed</h2>
      <p id="errorPopupMessage"></p>
      <div class="popup-actions">
        <button id="errorPopupClose" type="button">Close</button>
      </div>
    </div>
  </div>

  <img id="PostCaptureImage" style="display: none;" alt="" />

  <div class="camera-overlay">
    <div class="camera-top">
            <img id="returnicon" class="icon-returnarrow"src="/assets/icons/returnarrow.svg" alt="" onclick="window.location.href='/';"/>
      <button id="switchCameraButton" type="button" class="icon-button" aria-label="Switch camera">
        <img src="/assets/icons/switch_cam.svg" alt=""/>
      </button>
    </div>

    <div class="camera-bottom">
      <input id="uploadInput" type="file" accept="image/*" hidden />
      <button id="uploadButton" type="button" class="icon-button" aria-label="Upload image">
        <img src="/assets/icons/uploadImage.svg" alt="" />
      </button>
      <button id="captureButton" type="button" aria-label="Capture photo"></button>
    </div>
  </div>

  <canvas id="hiddenCanvas" style="display: none;"></canvas>
  <script src="/scripts/camera.js"></script>
</body>
</html>
