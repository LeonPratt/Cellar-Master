<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Take Photo</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #2b2b2b 0%, #111 40%);
      color: #fff;
    }

    body {
      display: grid;
      place-items: center;
      text-align: center;
    }

    .card {
      width: min(420px, calc(100% - 32px));
      padding: 36px 30px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 3vw, 2.8rem);
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 0 28px;
      color: #dcdcdc;
      line-height: 1.6;
    }

    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 220px;
      padding: 16px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #6b6bff, #00d0ff);
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .primary-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 32px rgba(0, 208, 255, 0.24);
    }

    .hint {
      margin-top: 24px;
      font-size: 0.94rem;
      color: #a3a3a3;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ready to take a photo</h1>
    <p>Tap the button below to open the camera and capture an image. The photo will be uploaded to the server automatically.</p>
    <a class="primary-button" href="/camera">Take photo</a>
    <div class="hint">Works best on mobile and desktop browsers with camera permissions.</div>
  </div>
</body>
</html>
