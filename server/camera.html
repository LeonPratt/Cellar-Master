<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: white;
    }

    #previewVideo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
    }

    .top-bar,
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      pointer-events: auto;
    }

    .top-bar {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.65), transparent);
    }

    .bottom-bar {
      background: linear-gradient(0deg, rgba(0, 0, 0, 0.55), transparent);
    }

    #statusText {
      font-size: 0.95rem;
      max-width: 75%;
      line-height: 1.4;
      color: #f1f1f1;
    }

    .control-buttons {
      display: flex;
      align-items: center;
      gap: 18px;
      width: 100%;
      justify-content: center;
    }

    .icon-button,
    #captureButton {
      border: none;
      background: none;
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .icon-button:hover,
    #captureButton:hover {
      transform: scale(1.05);
    }

    #switchCameraButton {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.75);
      background: rgba(0, 0, 0, 0.45);
      display: grid;
      place-items: center;
      padding: 0;
    }

    #switchCameraButton img {
      width: 22px;
      height: 22px;
      filter: invert(100%);
    }

    #captureButton {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      border: 4px solid rgba(255, 255, 255, 0.95);
      background: rgba(255, 255, 255, 0.15);
      position: relative;
    }

    #captureButton::before {
      content: '';
      position: absolute;
      inset: 14px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
    }

    #captureButton:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    @media (max-width: 480px) {
      .top-bar,
      .bottom-bar {
        padding: 14px;
      }

      #switchCameraButton {
        width: 46px;
        height: 46px;
      }

      #captureButton {
        width: 76px;
        height: 76px;
      }
    }
    #overlayDifv {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5); /* translucent grey */
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    }
  </style>
</head>
<body>
  <video id="previewVideo" playsinline autoplay muted visible ></video>
  <div id="overlayDiv">
      <img id ="PostCaptureImage" style="display: none;"></img>
  </div>
  <div class="overlay">
    <div class="top-bar">
      <div id="statusText">Initializing camera…</div>
      <button id="switchCameraButton" type="button" class="icon-button">
        <img src="./switch_cam.png" alt="Switch camera" />
      </button>
    </div>

    <div class="bottom-bar">
      <div class="control-buttons">
        <button id="captureButton" type="button" aria-label="Capture photo"></button>
      </div>
    </div>
  </div>

  <canvas id="hiddenCanvas" style="display:none"></canvas>
  <script src="camera.js"></script>
</body>
</html>
